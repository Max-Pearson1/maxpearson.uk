<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Pearson MYP | Staffordshire Youth Voice</title>
  <meta name="description" content="Max Pearson, Member of Youth Parliament for Staffordshire. A stronger voice for young people in Staffordshire." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=League+Spartan:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #102033;
      --navy-2: #142A42;
      --teal: #18B7A0;
      --teal-dark: #0D8F7F;
      --cream: #F6F0E3;
      --yellow: #F6C945;
      --charcoal: #111827;
      --muted: #5F6B7A;
      --white: #FFFFFF;
      --border: rgba(16, 32, 51, 0.14);
      --shadow: 0 22px 70px rgba(16, 32, 51, 0.18);
      --radius-lg: 28px;
      --radius-md: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--charcoal);
      background: var(--cream);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }

    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 36px));
      margin: 0 auto;
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: 12px;
      background: var(--yellow);
      color: var(--navy);
      padding: 10px 14px;
      border-radius: 10px;
      z-index: 999;
      font-weight: 800;
    }

    .skip-link:focus { left: 12px; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(246, 240, 227, 0.88);
      border-bottom: 1px solid rgba(16, 32, 51, 0.10);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 76px;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: max-content;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px 16px 16px 6px;
      background: var(--teal);
      color: var(--navy);
      display: grid;
      place-items: center;
      font-family: "League Spartan", sans-serif;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 6px 6px 0 var(--yellow);
    }

    .brand-text strong {
      display: block;
      font-family: "League Spartan", sans-serif;
      letter-spacing: -0.03em;
      font-size: 22px;
      line-height: 0.95;
      color: var(--navy);
    }

    .brand-text span {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      font-size: 14px;
      font-weight: 800;
      color: var(--navy);
    }

    .nav-links a { opacity: 0.85; }
    .nav-links a:hover { opacity: 1; color: var(--teal-dark); }

    .nav-cta {
      background: var(--navy);
      color: var(--white) !important;
      padding: 11px 16px;
      border-radius: 999px;
      opacity: 1 !important;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(24,183,160,0.22), transparent 34%),
        linear-gradient(135deg, var(--cream) 0%, #FFF9EF 42%, #EFE6D4 100%);
      padding: 74px 0 56px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -90px -160px auto;
      width: 390px;
      height: 390px;
      background: var(--yellow);
      border-radius: 50%;
      opacity: 0.45;
      filter: blur(2px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 44px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(24, 183, 160, 0.13);
      color: var(--navy);
      border: 1px solid rgba(24, 183, 160, 0.28);
      border-radius: 999px;
      padding: 8px 13px;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 5px rgba(24,183,160,0.16);
    }

    h1, h2, h3 { margin: 0; color: var(--navy); }

    h1 {
      font-family: "Bebas Neue", "League Spartan", sans-serif;
      font-size: clamp(64px, 10vw, 132px);
      line-height: 0.88;
      letter-spacing: 0.012em;
      text-transform: uppercase;
      max-width: 740px;
    }

    .hero-highlight {
      color: var(--teal-dark);
      text-shadow: 5px 5px 0 rgba(246, 201, 69, 0.7);
    }

    .hero-subtitle {
      font-size: clamp(17px, 2vw, 21px);
      color: #344154;
      max-width: 670px;
      margin: 24px 0 0;
      font-weight: 500;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--navy);
      color: var(--white);
      box-shadow: 0 14px 30px rgba(16, 32, 51, 0.25);
    }

    .btn-secondary {
      background: var(--yellow);
      color: var(--navy);
      box-shadow: 0 14px 30px rgba(122, 85, 0, 0.14);
    }

    .hero-card {
      background: var(--navy);
      color: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
      min-height: 520px;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 20px 20px auto auto;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      border: 18px solid rgba(24,183,160,0.55);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto auto -70px -80px;
      width: 220px;
      height: 220px;
      background: var(--yellow);
      border-radius: 48px;
      rotate: 18deg;
      opacity: 0.95;
    }

    .portrait-placeholder {
      min-height: 355px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.06) 0 12px, rgba(255,255,255,0.02) 12px 24px);
      border: 1px solid rgba(255,255,255,0.16);
      display: flex;
      align-items: flex-end;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .portrait-placeholder .photo-note {
      max-width: 280px;
      font-weight: 800;
      color: rgba(255,255,255,0.85);
    }

    .hero-stat {
      position: relative;
      z-index: 2;
      margin-top: 18px;
      background: var(--white);
      color: var(--navy);
      border-radius: 22px;
      padding: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .hero-stat strong {
      display: block;
      font-family: "League Spartan", sans-serif;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero-stat span {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
      font-size: 13px;
    }

    .speech-icon {
      width: 55px;
      height: 55px;
      border-radius: 18px 18px 18px 5px;
      background: var(--teal);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--navy);
    }

    section { padding: 78px 0; }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 28px;
      align-items: end;
      margin-bottom: 28px;
    }

    .section-kicker {
      font-weight: 950;
      letter-spacing: 0.12em;
      color: var(--teal-dark);
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 10px;
    }

    h2 {
      font-family: "League Spartan", sans-serif;
      font-size: clamp(36px, 5vw, 60px);
      line-height: 0.95;
      letter-spacing: -0.045em;
    }

    .section-lede {
      color: var(--muted);
      max-width: 520px;
      font-weight: 600;
      margin: 0;
    }

    .cards-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 26px;
      box-shadow: 0 14px 40px rgba(16,32,51,0.07);
    }

    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      background: var(--teal);
      color: var(--navy);
      display: grid;
      place-items: center;
      font-weight: 950;
      margin-bottom: 18px;
      box-shadow: 5px 5px 0 rgba(246, 201, 69, 0.85);
    }

    .card h3 {
      font-family: "League Spartan", sans-serif;
      font-size: 30px;
      letter-spacing: -0.035em;
      margin-bottom: 8px;
    }

    .card p { margin: 0; color: var(--muted); font-weight: 560; }

    .have-say {
      background: var(--navy);
      color: var(--white);
      border-radius: 34px;
      padding: 44px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 28px;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .have-say::after {
      content: "HAVE YOUR SAY";
      position: absolute;
      right: -16px;
      bottom: -18px;
      font-family: "Bebas Neue", sans-serif;
      color: rgba(255,255,255,0.06);
      font-size: clamp(78px, 12vw, 160px);
      line-height: 0.8;
      white-space: nowrap;
    }

    .have-say h2, .have-say p { color: var(--white); position: relative; z-index: 1; }
    .have-say p { max-width: 650px; font-size: 18px; opacity: 0.87; font-weight: 560; }
    .have-say .hero-actions { margin-top: 24px; position: relative; z-index: 1; }

    .priorities-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .priority {
      grid-column: span 2;
      min-height: 210px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(16,32,51,0.08);
    }

    .priority:nth-child(1), .priority:nth-child(2) { grid-column: span 3; }

    .priority .tag {
      display: inline-flex;
      background: rgba(24,183,160,0.13);
      color: var(--teal-dark);
      border: 1px solid rgba(24,183,160,0.24);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .priority h3 {
      font-family: "League Spartan", sans-serif;
      font-size: 34px;
      letter-spacing: -0.04em;
      line-height: 0.98;
      margin-bottom: 10px;
    }

    .priority p { color: var(--muted); margin: 0; font-weight: 570; }

    .updates {
      background: #fff8ec;
      border-top: 1px solid rgba(16,32,51,0.08);
      border-bottom: 1px solid rgba(16,32,51,0.08);
    }

    .updates-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 18px;
    }

    .update-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 16px 42px rgba(16,32,51,0.08);
    }

    .update-top {
      min-height: 150px;
      background:
        linear-gradient(135deg, rgba(24,183,160,0.92), rgba(246,201,69,0.78)),
        var(--navy);
      padding: 20px;
      display: flex;
      align-items: end;
      color: var(--navy);
      font-family: "Bebas Neue", sans-serif;
      font-size: 46px;
      line-height: 0.9;
      letter-spacing: 0.01em;
    }

    .update-body { padding: 22px; }
    .date { color: var(--teal-dark); font-weight: 950; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
    .update-body h3 { font-family: "League Spartan", sans-serif; font-size: 29px; letter-spacing: -0.035em; margin: 8px 0; }
    .update-body p { margin: 0 0 18px; color: var(--muted); font-weight: 560; }
    .text-link { font-weight: 950; color: var(--navy); border-bottom: 3px solid var(--yellow); }

    .explain-grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 26px;
      align-items: stretch;
    }

    .explain-panel {
      background: var(--teal);
      border-radius: 30px;
      padding: 32px;
      color: var(--navy);
      position: relative;
      overflow: hidden;
      min-height: 360px;
    }

    .explain-panel::after {
      content: "?";
      position: absolute;
      right: 18px;
      bottom: -76px;
      font-family: "League Spartan", sans-serif;
      font-size: 300px;
      line-height: 1;
      color: rgba(16,32,51,0.12);
      font-weight: 900;
    }

    .explain-panel h2 { position: relative; z-index: 1; }
    .explain-panel p { position: relative; z-index: 1; font-weight: 680; max-width: 410px; }

    .explainer-list {
      display: grid;
      gap: 14px;
    }

    .explainer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 22px;
      font-weight: 900;
      color: var(--navy);
    }

    .explainer-item span {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--yellow);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .tracker {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(16,32,51,0.08);
    }

    .tracker-row {
      display: grid;
      grid-template-columns: 1.1fr 1fr 0.8fr;
      gap: 18px;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(16,32,51,0.09);
      align-items: center;
    }

    .tracker-row:last-child { border-bottom: 0; }
    .tracker-head { background: var(--navy); color: var(--white); font-weight: 950; text-transform: uppercase; letter-spacing: 0.08em; font-size: 13px; }
    .status {
      display: inline-flex;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      background: rgba(24,183,160,0.14);
      color: var(--teal-dark);
      padding: 7px 10px;
      font-weight: 950;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .about-contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .panel {
      border-radius: 30px;
      padding: 34px;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: 0 16px 42px rgba(16,32,51,0.08);
    }

    .panel.dark {
      background: var(--navy);
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .panel.dark h2, .panel.dark p { color: var(--white); position: relative; z-index: 1; }
    .panel p { color: var(--muted); font-weight: 560; }
    .panel.dark p { opacity: 0.86; }

    .panel.dark::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      background: var(--yellow);
      right: -75px;
      bottom: -75px;
      border-radius: 50%;
    }

    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.78);
      padding: 32px 0;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      font-weight: 700;
      font-size: 14px;
    }

    .footer-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    @media (max-width: 940px) {
      .nav-links { display: none; }
      .hero { padding-top: 48px; }
